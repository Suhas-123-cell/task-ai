# Railway deployment config for the frontend service.
# In the Railway dashboard: create a second service (separate from backend),
# set its Root Directory to "frontend", and it will pick this file up
# automatically.

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
# `serve` (added as a dependency below) hosts the built static files on
# Railway's assigned $PORT -- Vite's own dev server (`npm run dev`) is not
# meant for production hosting.
startCommand = "npx serve -s dist -l $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required manual step in the Railway dashboard (not expressible in this file):
# Set VITE_API_BASE_URL to the backend service's public Railway URL (e.g.
# https://your-backend.up.railway.app) BEFORE the first build -- Vite bakes
# env vars into the built JS bundle at build time, so setting this after
# deploying does nothing until the next rebuild.
